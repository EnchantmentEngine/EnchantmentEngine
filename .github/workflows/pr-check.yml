name: PR Title and Description Checks

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  check-pr:
    runs-on: ubuntu-latest
    steps:
      - run: curl -fsSL https://ollama.com/install.sh | sh
      - run: ollama list
      - run: ollama serve & ollama pull qwen2.5:7b
      - run: tree ~/.ollama
      - name: Check PR Title and Description
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setFailed("No pull request found.");
              return;
            }

            const title = pr.title ? pr.title.trim() : "";
            const body = pr.body ? pr.body.trim() : "";

            const prompt = `
            # PR Review Prompt

            You're evaluating the quality of a pull request. Focus on two main elements:

            1. **Title** - Should be short and descriptive, clearly indicating what the PR does
            2. **Description** - Should explain what changes were made and why they're needed

            Also verify:
            - A JIRA ticket URL is included in the format: \`https://tsu.atlassian.net/browse/IR-<number>\`
            - Or an explicit statement that no JIRA ticket is applicable

            ## Evaluation Requirements

            For the PR title:
            - Is it concise?
            - Does it clearly indicate the PR's purpose?
            - Is it specific rather than vague?

            For the PR description:
            - Does it explain what changes were made?
            - Does it explain why the changes were needed?
            - Is there sufficient context for reviewers?

            For JIRA tickets:
            - Is a valid JIRA ticket linked (\`https://tsu.atlassian.net/browse/IR-<number>\`)?
            - If no ticket is linked, is this explicitly stated?

            ## Response Format

            Review the PR silently against the criteria above. Provide feedback ONLY if the PR has insufficient title or description.

            If the PR passes all checks, return no message.

            If the PR is insufficient in any area, return specific feedback on what needs to be improved. Format your feedback like this:

            \`\`\`
            PR Review: Changes Needed

            [List specific issues with the title and/or description that need to be addressed]
            \`\`\`
            `;

            const response = await fetch('http://localhost:11434/api/generate', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                model: 'qwen2.5:7b',
                prompt: prompt.trim(),
                stream: false
              })
            });

            const output = await response.json()

            console.log('debug', output)

            core.info('output', output)
            // await github.rest.issues.createComment({
            //   issue_number: context.issue.number,
            //   owner: context.repo.owner,
            //   repo: context.repo.repo,
            //   body: output
            // })