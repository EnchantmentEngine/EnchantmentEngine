name: Qwiet.AI Static Analysis

on:
  push:
    branches:
      - irene/IR-8651_Qwiet.AI  
  workflow_dispatch: #enables the “Run workflow” button in the Actions UI
    inputs: # optional
      scan-path:
        description: 'Directory (or glob) to scan'    # optional
        required: false
        default: '.'
      fail-on-severity:
        description: 'Minimum severity to fail (e.g., LOW, MEDIUM, HIGH, CRITICAL)'    # optional
        required: false
        default: 'HIGH'
      custom-message:
        description: 'Custom message to include in the scan result'    # optional
        required: false
        default: 'Scanning codebase'

jobs:
  qwiet-nextgen-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full codebase
        uses: actions/checkout@v3  #Pulls the entire repo at that commit

      - name: Run Qwiet.AI scan
        run: |
          curl https://cdn.shiftleft.io/download/sl > /usr/local/bin/sl && chmod a+rx /usr/local/bin/sl
          sl analyze --app "${GITHUB_REPOSITORY_OWNER}_${GITHUB_REPOSITORY#*/}" --verbose .
          
        env:
          SHIFTLEFT_ACCESS_TOKEN: ${{ secrets.SHIFTLEFT_ACCESS_TOKEN }}  #Make sure this secret is set
