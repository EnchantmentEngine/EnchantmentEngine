name: branch-build
on:
  pull_request:
    branches: [dev, release*]
  push:
    branches: [dev, release*]
  merge_group:
    types: [checks_requested]
jobs:
  secrets-gate:
    runs-on: ubuntu-latest
    outputs:
      ok: ${{ steps.check-secrets.outputs.ok }}
    steps:
      - name: check for secrets needed to run workflows
        id: check-secrets
        run: |
          if [ ${{ secrets.BRANCH_BUILD_ENABLED }} == 'true' ]; then
            echo "ok=enabled" >> $GITHUB_OUTPUT
          fi
  install-modules:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22.x
      - name: restore lerna
        uses: actions/cache@v3
        with:
          path: |
            node_modules
            */*/node_modules
            package-lock.json
          key: ${{ runner.os }}-branch-build-${{ hashFiles('**/package.json') }}
      - run: cp .env.local.default .env.local
      - run: sed -i 's/localhost/127.0.0.1/g' .env.local
      - name: Config npm registry token
        run: npm config set '//npm.pkg.github.com/:_authToken' "${NPM_TOKEN}"
        env:
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm install --production=false --loglevel notice --legacy-peer-deps
      - name: cache for next steps
        uses: actions/cache@v3
        with:
          path: .
          key: dir-${{github.sha}}

  check-lint:
    needs: install-modules
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/cache@v3
        with:
          path: .
          key: dir-${{github.sha}}
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22.x
      - run: npm run lint
      - run: npm run check-eslint
        timeout-minutes: 20

  check-errors:
    needs: install-modules
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/cache@v3
        with:
          path: .
          key: dir-${{github.sha}}
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22.x
      - run: npm run dev-docker
      - run: npm run dev-reinit
      - run: npx lerna run --scope '@ir-engine/*' check-errors
        timeout-minutes: 20

  build-client:
    needs: install-modules
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/cache@v3
        with:
          path: .
          key: dir-${{github.sha}}
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22.x
      - run: npm run dev-docker
      - run: npm run dev-reinit
      - run: rm -rf packages/instanceserver
      - run: rm -rf packages/server
      - run: rm -rf packages/server-core
      - run: rm -rf packages/taskserver
      - run: npm run build-client

  test_hyperflux:
    needs: install-modules
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/cache@v3
        with:
          path: .
          key: dir-${{github.sha}}
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22.x
      - run: mkdir -p packages_moved/hyperflux/
      - run: mv packages/hyperflux packages_moved/
      - run: rm -rf packages/*
      - run: mv packages_moved/hyperflux packages/
      - run: cd packages/hyperflux && npm run test

  test_ecs:
    needs: install-modules
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/cache@v3
        with:
          path: .
          key: dir-${{github.sha}}
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22.x
      - run: mkdir -p packages_moved/hyperflux/
      - run: mkdir -p packages_moved/ecs/
      - run: mv packages/hyperflux packages_moved/
      - run: mv packages/ecs packages_moved/
      - run: rm -rf packages/*
      - run: mv packages_moved/hyperflux packages/
      - run: mv packages_moved/ecs packages/
      - run: cd packages/ecs && npm run test

  test_network:
    needs: install-modules
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/cache@v3
        with:
          path: .
          key: dir-${{github.sha}}
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22.x
      - run: mkdir -p packages_moved/hyperflux/
      - run: mkdir -p packages_moved/ecs/
      - run: mkdir -p packages_moved/network/
      - run: mv packages/hyperflux packages_moved/
      - run: mv packages/ecs packages_moved/
      - run: mv packages/network packages_moved/
      - run: rm -rf packages/*
      - run: mv packages_moved/hyperflux packages/
      - run: mv packages_moved/ecs packages/
      - run: mv packages_moved/network packages/
      - run: cd packages/network && npm run test

  test_spatial:
    needs: install-modules
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/cache@v3
        with:
          path: .
          key: dir-${{github.sha}}
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22.x
      - run: mkdir -p packages_moved/hyperflux/
      - run: mkdir -p packages_moved/ecs/
      - run: mkdir -p packages_moved/network/
      - run: mkdir -p packages_moved/xrui/
      - run: mkdir -p packages_moved/spatial/
      - run: mv packages/hyperflux packages_moved/
      - run: mv packages/ecs packages_moved/
      - run: mv packages/network packages_moved/
      - run: mv packages/xrui packages_moved/
      - run: mv packages/spatial packages_moved/
      - run: rm -rf packages/*
      - run: mv packages_moved/hyperflux packages/
      - run: mv packages_moved/ecs packages/
      - run: mv packages_moved/network packages/
      - run: mv packages_moved/xrui packages/
      - run: mv packages_moved/spatial packages/
      - run: cd packages/spatial && npm run test

  test_engine:
    needs: install-modules
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/cache@v3
        with:
          path: .
          key: dir-${{github.sha}}
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22.x
      - run: mkdir -p packages_moved/hyperflux/
      - run: mkdir -p packages_moved/ecs/
      - run: mkdir -p packages_moved/network/
      - run: mkdir -p packages_moved/xrui/
      - run: mkdir -p packages_moved/spatial/
      - run: mkdir -p packages_moved/engine/
      - run: mkdir -p packages_moved/projects/
      - run: mv packages/hyperflux packages_moved/
      - run: mv packages/ecs packages_moved/
      - run: mv packages/network packages_moved/
      - run: mv packages/xrui packages_moved/
      - run: mv packages/spatial packages_moved/
      - run: mv packages/engine packages_moved/
      - run: mv packages/projects packages_moved/
      - run: rm -rf packages/*
      - run: mv packages_moved/hyperflux packages/
      - run: mv packages_moved/ecs packages/
      - run: mv packages_moved/network packages/
      - run: mv packages_moved/xrui packages/
      - run: mv packages_moved/spatial packages/
      - run: mv packages_moved/engine packages/
      - run: mv packages_moved/projects packages/
      - run: cd packages/engine && npm run test

  test_client:
    needs: install-modules
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - client
          - client-core
          - common
          - editor
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/cache@v3
        with:
          path: .
          key: dir-${{github.sha}}
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22.x
      - run: rm -rf packages/instanceserver
      - run: rm -rf packages/server
      - run: rm -rf packages/server-core
      - run: rm -rf packages/taskserver
      - run: cd packages/${{ matrix.package }} && npm run test

  test_server:
    needs: install-modules
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - instanceserver
          - matchmaking
          - server
          - server-core
          - taskserver
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/cache@v3
        with:
          path: .
          key: dir-${{github.sha}}
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22.x
      - run: rm -rf packages/client
      - run: rm -rf packages/client-core
      - run: rm -rf packages/editor
      - run: rm -rf packages/ui
      - run: npm run dev-docker
      - run: npm run dev-reinit
      - run: git config --global user.email "you@example.com" && git config --global user.name "Your Name"
      - run: cd packages/${{ matrix.package }} && npm run test
        timeout-minutes: 20

  npm_builds:
    needs: install-modules
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/cache@v3
        with:
          path: .
          key: dir-${{github.sha}}
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22.x
      - name: Checkout Build Test
        uses: actions/checkout@v3
        with:
          repository: ir-engine/ir-engine
          ref: ${{ env.checkout_branch }}
      - name: Checkout Engine
        uses: actions/checkout@v3
        with:
          path: '../ir-engine'
      - name: Run build test
        run: |
          cd ../ir-engine-build-tests
          npm i
          npm run setup
          npm run test
